server {
    listen 80;
    server_name petrosyan.duckdns.org;

    client_max_body_size 20m;

    location = / {
        return 302 /portal/;
    }

    location = /portal {
        return 301 /portal/;
    }

    location ^~ /portal/assets/ {
        alias /var/www/fw/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control 'public';
    }

    location = /portal/favicon.ico {
        alias /var/www/fw/favicon.ico;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        alias /var/www/fw/favicon.ico;
        access_log off;
        log_not_found off;
    }

    location = /portal/index.html {
        alias /var/www/fw/index.html;
        add_header Cache-Control 'no-cache';
    }

    location /portal/ {
        alias /var/www/fw/;
        index index.html;

        if (!-e $request_filename) {
            rewrite ^ /portal/index.html last;
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_connect_timeout 60;
        proxy_send_timeout 86400;
    }
}
