# FieldWorker Docker Compose (SQLite)
# ====================================
# Запуск: docker-compose up -d
# Остановка: docker-compose down
# Логи: docker-compose logs -f
# Пересборка: docker-compose up -d --build
#
# Конфигурация через .env файл в корне проекта (см. server/.env.example)

services:
  # ==========================================================================
  # FieldWorker API Server (FastAPI + SQLite)
  # ==========================================================================
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fieldworker-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=sqlite:///./tasks.db
    volumes:
      - ./server:/app
      - ./portal/dist:/portal/dist:ro
    ports:
      - "${PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  # ==========================================================================
  # Telegram Bot (парсинг заявок из чата)
  # ==========================================================================
  telegram-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: fieldworker-telegram
    restart: unless-stopped
    env_file:
      - ./bot/.env
    environment:
      - API_BASE_URL=http://api:8001
    depends_on:
      - api
