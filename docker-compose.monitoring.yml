# FieldWorker Docker Compose — Monitoring Stack
# ================================================
# Поднимается ПОВЕРХ основного PG-стека (общая compose-сеть, чтобы Prometheus
# резолвил server/node-exporter по имени):
#   docker compose -f docker-compose.postgres.yml -f docker-compose.monitoring.yml up -d
# Скрипт деплоя делает это автоматически по флагу -Monitoring.
#
# Prometheus: http://localhost:9090
# Grafana:    http://localhost:3000 (admin/admin — поменяйте GRAFANA_PASSWORD)
# node-exporter отдаёт метрики хоста на :9100 (наружу не публикуется).

services:
  # ==========================================================================
  # Prometheus — сбор метрик
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fieldworker-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - server

  # ==========================================================================
  # node-exporter — метрики хоста (CPU/RAM/диск/сеть)
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: fieldworker-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host

  # ==========================================================================
  # Grafana — визуализация метрик
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: fieldworker-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
