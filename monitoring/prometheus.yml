global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FieldWorker API Server (PG-стек: сервис называется server; для legacy
  # SQLite-стека замените на api:8001).
  - job_name: 'fieldworker-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['server:8001']
        labels:
          service: 'fieldworker'
          environment: 'production'

  # node-exporter — метрики хоста (CPU/RAM/диск/сеть/load).
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
