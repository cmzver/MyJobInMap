global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FieldWorker API Server
  - job_name: 'fieldworker-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8001']
        labels:
          service: 'fieldworker'
          environment: 'production'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
