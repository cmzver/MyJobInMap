name: Server CI

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**"
      - ".github/workflows/ci-server.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/ci-server.yml"

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin formatters: an unpinned black/isort can suddenly reformat and
          # fail CI before pytest even runs. Bump deliberately.
          pip install pytest pytest-cov black==26.5.1 isort==8.0.1

      - name: Lint with Black
        run: black --check --diff app/ tests/

      - name: Check imports with isort
        run: isort --check-only --diff app/ tests/

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: server/coverage.xml

  # Тот же набор тестов против PostgreSQL — ловит диалект-несовместимости
  # перед миграцией прода с SQLite на PostgreSQL (см. docs ADR-0002).
  server-tests-postgres:
    name: Server Tests (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fieldworker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests against PostgreSQL
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/fieldworker_test
        run: |
          python -m pytest tests/ -v --tb=short
