name: Server CI

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**"
      - ".github/workflows/ci-server.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/ci-server.yml"

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin formatters: an unpinned black/isort can suddenly reformat and
          # fail CI before pytest even runs. Bump deliberately.
          pip install pytest pytest-cov black==26.5.1 isort==8.0.1

      - name: Lint with Black
        run: black --check --diff app/ tests/

      - name: Check imports with isort
        run: isort --check-only --diff app/ tests/

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: server/coverage.xml
