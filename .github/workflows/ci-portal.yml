name: Portal CI

on:
  push:
    branches: [main, develop]
    paths:
      - "portal/**"
      - ".github/workflows/ci-portal.yml"
  pull_request:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/ci-portal.yml"

jobs:
  portal-lint:
    name: Portal Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
