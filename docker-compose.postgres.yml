# FieldWorker — полный стек в Docker (PostgreSQL), как в проде
# ===========================================================
# Поднять всё:   docker compose -f docker-compose.postgres.yml up -d --build
# Логи:          docker compose -f docker-compose.postgres.yml logs -f
# Остановить:    docker compose -f docker-compose.postgres.yml down
#
# Состав: PostgreSQL + Redis + API (FastAPI) + ARQ worker. Образ api/worker
# содержит postgresql-client, поэтому бэкапы (pg_dump) работают нативно внутри
# контейнера — BACKUP_PG_DOCKER_CONTAINER здесь НЕ нужен (и явно гасится, чтобы
# значение из server/.env, предназначенное для запуска на хосте, не протекло).

services:
  # ==========================================================================
  # PostgreSQL
  # ==========================================================================
  db:
    image: postgres:15-alpine
    container_name: fieldworker_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fieldworker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fieldworker_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fieldworker_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fieldworker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis — брокер фоновой очереди задач (ARQ)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: fieldworker_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # API Server (FastAPI + PostgreSQL)
  # ==========================================================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fieldworker_server
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      # Адрес БД/Redis зависит от compose-сети → задаём здесь (перекрывает .env).
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fieldworker}:${POSTGRES_PASSWORD:-fieldworker_secret}@db:5432/${POSTGRES_DB:-fieldworker_db}
      - REDIS_URL=redis://redis:6379/0
      - TASK_QUEUE_ENABLED=true
      # В контейнере pg_dump установлен — docker-exec режим не нужен; гасим
      # возможное значение из server/.env (оно для запуска на хосте).
      - BACKUP_PG_DOCKER_CONTAINER=
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PORT=8001
      - LOG_FORMAT=json
      - BACKUP_SCHEDULER_ENABLED=${BACKUP_SCHEDULER_ENABLED:-false}
    ports:
      - "${PORT:-8001}:8001"
    volumes:
      - server_uploads:/app/uploads
      - server_logs:/app/logs
      - server_backups:/app/backups
      - ./portal/dist:/portal/dist:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==========================================================================
  # ARQ Worker — фоновый обработчик очереди (push и т.п.)
  # ==========================================================================
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fieldworker_worker
    restart: always
    command: ["arq", "app.worker.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fieldworker}:${POSTGRES_PASSWORD:-fieldworker_secret}@db:5432/${POSTGRES_DB:-fieldworker_db}
      - REDIS_URL=redis://redis:6379/0
      - TASK_QUEUE_ENABLED=true
      - BACKUP_PG_DOCKER_CONTAINER=
      - ENVIRONMENT=${ENVIRONMENT:-production}
    # У образа есть HEALTHCHECK на curl :8001, но worker не поднимает веб-сервер,
    # поэтому свой healthcheck отключаем (иначе контейнер был бы "unhealthy").
    healthcheck:
      disable: true
    volumes:
      - server_uploads:/app/uploads
      - server_logs:/app/logs

volumes:
  postgres_data:
  redis_data:
  server_uploads:
  server_logs:
  server_backups:
